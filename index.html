<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AUN | 商談向けエディトリアルサイト</title>
    <meta
      name="description"
      content="AUN は、静けさの輪郭を纏う東京発の独立系レーベルです。取扱先、スタイリスト、メディア向けに今季の空気と判断材料をまとめています。"
    />
    <link rel="icon" href="./assets/generated/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Old+Mincho:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-page="home">
    <a class="skip-link" href="#main">本文へ移動</a>
    <header class="site-header">
      <div class="site-shell site-header-inner">
        <a class="brandmark" href="./index.html" aria-label="AUN home">
          <span class="brandmark-word">AUN</span>
          <span class="brandmark-meta" id="brand-location"></span>
        </a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
          メニュー
        </button>
        <nav class="site-nav" id="site-nav" aria-label="Primary">
          <a data-nav-link="home" href="./index.html">トップ</a>
          <a data-nav-link="lookbook" href="./lookbook.html">ルック</a>
          <a data-nav-link="about" href="./about.html">ブランド</a>
          <a href="./variants/showcase/">18案比較</a>
          <a class="cta-link" id="header-contact-link" href="mailto:partners@aun-studio.example"
            >問い合わせ</a
          >
        </nav>
      </div>
    </header>

    <main id="main">
      <section class="poster-hero">
        <div class="site-shell poster-hero-grid">
          <div class="poster-copy" data-reveal>
            <p class="section-label" id="hero-label"></p>
            <h1 class="poster-title">
              <span id="hero-brand-name"></span>
              <span id="hero-theme"></span>
            </h1>
            <p class="poster-summary" id="hero-summary"></p>
            <div class="hero-actions">
              <a class="button button-primary" href="./lookbook.html">ルックを見る</a>
              <a class="button button-secondary" href="./variants/showcase/">18案を見る</a>
              <a class="button button-secondary" href="#partner-note">取扱のご相談</a>
            </div>
            <dl class="stat-line" id="hero-stat-line"></dl>
          </div>
          <figure class="poster-visual" data-reveal>
            <img id="hero-image" src="" alt="" />
            <figcaption class="visual-caption" id="hero-visual-caption"></figcaption>
          </figure>
        </div>
      </section>

      <section class="section section-tight">
        <div class="site-shell intro-grid">
          <div class="section-heading" data-reveal>
            <p class="section-label">今季の見立て</p>
            <h2 id="season-heading"></h2>
          </div>
          <div class="eyebrow-copy" data-reveal>
            <p id="season-copy"></p>
            <div class="meta-pairs">
              <div>
                <span>想定先</span>
                <strong id="audience-copy"></strong>
              </div>
              <div>
                <span>価格の印象</span>
                <strong id="price-copy"></strong>
              </div>
              <div>
                <span>制作拠点</span>
                <strong id="studio-copy"></strong>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="section section-tight">
        <div class="site-shell">
          <div class="section-heading editorial-heading" data-reveal>
            <p class="section-label">補助ビジュアル</p>
            <h2>会話の前に、ラインの温度を補うための補助カットです。</h2>
          </div>
          <div class="editorial-strip" id="home-editorial-strip"></div>
        </div>
      </section>

      <section class="section" id="partner-note">
        <div class="site-shell">
          <div class="section-heading" data-reveal>
            <p class="section-label">導入の理由</p>
            <h2>取扱先、スタイリスト、エディターに向けた短い判断材料です。</h2>
          </div>
          <div class="reason-grid" id="reason-grid"></div>
        </div>
      </section>

      <section class="section feature-stage">
        <div class="site-shell feature-stage-grid">
          <figure class="feature-image" data-reveal>
            <img id="feature-image" src="" alt="" />
            <figcaption class="visual-caption" id="feature-caption"></figcaption>
          </figure>
          <div class="feature-copy" data-reveal>
            <p class="section-label">代表ルック</p>
            <h2 id="feature-title"></h2>
            <p class="feature-summary" id="feature-summary"></p>
            <ul class="detail-list" id="feature-details"></ul>
            <a class="button button-secondary" href="./lookbook.html">全ルックを見る</a>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="site-shell dual-panel">
          <div data-reveal>
            <p class="section-label">注目ピース</p>
            <h2>空気を崩さずに、商材としての見え方も担保する構成です。</h2>
          </div>
          <div class="selected-piece-list" id="selected-piece-list"></div>
        </div>
      </section>

      <section class="section section-dark">
        <div class="site-shell partner-grid">
          <div data-reveal>
            <p class="section-label">取扱・掲載・協業</p>
            <h2>資料、ラインシート、補足情報はご要望に応じてお送りします。</h2>
          </div>
          <div class="contact-rail" id="partner-rail" data-reveal></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-shell site-footer-inner">
        <div>
          <strong id="footer-brand"></strong>
          <p id="footer-summary"></p>
        </div>
        <div class="footer-meta">
          <p id="footer-note"></p>
          <small>© <span id="year"></span> AUN</small>
        </div>
      </div>
    </footer>

    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
